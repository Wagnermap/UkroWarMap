<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>War Map Pro - Final Stable</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.draw@1.0.4/dist/leaflet.draw.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0b0b0b; font-family: sans-serif; }
        #map { width: 100%; height: 100vh; }

        .search-container {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 1000; width: 350px; display: flex;
            background: rgba(20, 20, 20, 0.95); padding: 6px; border-radius: 10px;
            border: 1px solid #444; box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }
        .search-container input { flex: 1; background: transparent; border: none; color: white; padding: 8px 15px; outline: none; }
        .search-container button { background: #2c85ff; color: white; border: none; padding: 8px 20px; border-radius: 6px; cursor: pointer; }

        .leaflet-control-layers { background: #1a1a1a !important; color: white !important; border-radius: 8px; }
        .leaflet-control-layers label { color: white !important; }

        .export-button {
            position: absolute; bottom: 20px; right: 20px; z-index: 1000;
            background: #2c85ff; color: white; border: none; padding: 10px 15px;
            border-radius: 6px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="Search: City, Village or Coords">
    <button onclick="runSearch()">Search</button>
</div>

<div id="map"></div>
<button class="export-button" onclick="exportDrawnData()">Export My Drawn Items</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://unpkg.com/leaflet.draw@1.0.4/dist/leaflet.draw.js"></script>

<script>
    // Инициализация
    var map = L.map('map', { center: [48.0, 37.5], zoom: 8, zoomControl: false });
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    // --- БАЗОВЫЕ СЛОИ (ТОЛЬКО РАБОЧИЕ) ---
    var googleHybrid = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 20, attribution: 'Google' });
    var esriSatellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19, attribution: 'Esri' });
    var sentinelLatest = L.tileLayer('https://tiles.maps.eox.at/wmts/1.0.0/s2cloudless-2023/default/googlemaps-grid/{z}/{y}/{x}.jpg', { maxZoom: 16, attribution: 'Sentinel-2' });

    esriSatellite.addTo(map);

    // Пожары NASA (WMS)
    var nasaFirms = L.tileLayer.wms("https://firms.modaps.eosdis.nasa.gov/mapserver/wms/v1/currect/", {
        layers: 'fires_viirs_snpp',
        format: 'image/png',
        transparent: true,
        attribution: "NASA FIRMS"
    });

    // --- ГРУППЫ СЛОЕВ ---
    var Russia = L.layerGroup().addTo(map);
    var Ukraine = L.layerGroup().addTo(map);
    var Trenches = L.layerGroup().addTo(map);
    var Teeth = L.layerGroup().addTo(map);
    var Wire = L.layerGroup().addTo(map);
    var drawnItems = new L.FeatureGroup().addTo(map);

    // --- МЕНЮ СЛОЕВ ---
    var baseMaps = {
        "Esri High-Res": esriSatellite,
        "Google Hybrid": googleHybrid,
        "Sentinel-2 (Latest)": sentinelLatest
    };

    var overlayMaps = {
        "<b style='color: #ff4d4d'>Russia (Occupied)</b>": Russia,
        "<b style='color: #2c85ff'>Ukraine</b>": Ukraine,
        "<b style='color: #ffa500'>Trenches</b>": Trenches,
        "<b style='color: #ADD8E6'>Dragon's Teeth</b>": Teeth,
        "<b style='color: #888'>Wire Fence</b>": Wire,
        "<b style='color: #ff0000'>Active Fires (NASA)</b>": nasaFirms,
        "<b style='color: #FFFF00'>My Drawn Items</b>": drawnItems
    };

    L.control.layers(baseMaps, overlayMaps, { position: 'topleft', collapsed: false }).addTo(map);

    // --- СТИЛИ ГЕОДАННЫХ ---
    function styleFeature(feature) {
        var name = (feature.properties.name || "").toLowerCase();
        if (name.includes("ukraine")) return { color: "#2c85ff", fillOpacity: 0.3, weight: 1 };
        if (name.includes("russia")) return { color: "transparent", fillColor: "#d11919", fillOpacity: 0.2, weight: 0 };
        if (name.includes("trench")) return { color: "#ffa500", weight: 3 };
        if (name.includes("teeth")) return { color: "#ADD8E6", weight: 2 };
        if (name.includes("wire")) return { color: "#888", weight: 2, dashArray: "5, 10" };
        return { color: "#fff", weight: 1 };
    }

    // --- ЗАГРУЗКА ФАЙЛОВ ---
    function loadGeo(url, group) {
        $.getJSON(url, function(data) {
            L.geoJSON(data, {
                style: styleFeature,
                onEachFeature: function(f, l) {
                    if (f.properties.name) l.bindPopup(f.properties.name);
                    l.addTo(group);
                }
            });
        }).fail(function() { console.log("Файл не найден: " + url); });
    }

    loadGeo("data/ukraine.json", Ukraine);
    loadGeo("data/russia.json", Russia);
    loadGeo("data/trenches.json", Trenches);
    loadGeo("data/teeth.json", Teeth);
    loadGeo("data/wire.json", Wire);

    // --- ПОИСК ---
    function runSearch() {
        var query = document.getElementById('searchInput').value;
        if (!query) return;
        $.getJSON('https://nominatim.openstreetmap.org/search?format=json&q=' + query, function(data) {
            if (data.length > 0) map.setView([data[0].lat, data[0].lon], 12);
        });
    }

    // --- РИСОВАНИЕ ---
    var drawControl = new L.Control.Draw({
        edit: { featureGroup: drawnItems },
        draw: {
            polyline: { shapeOptions: { color: '#ffff00', weight: 4 } }, polygon: { shapeOptions: { color: '#00ff00', fillOpacity: 0.2 } },
            circle: false, marker: true, rectangle: true
        }
    });
    map.addControl(drawControl);

    map.on(L.Draw.Event.CREATED, function (e) {
        drawnItems.addLayer(e.layer);
    });

    // ЭКСПОРТ
    function exportDrawnData() {
        var data = drawnItems.toGeoJSON();
        var blob = new Blob([JSON.stringify(data)], {type: "application/json"});
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "my_military_data.geojson";
        a.click();
    }

    // Координаты по правому клику
    map.on('contextmenu', function(e) {
        L.popup().setLatLng(e.latlng)
            .setContent("Lat: " + e.latlng.lat.toFixed(6) + "<br>Lon: " + e.latlng.lng.toFixed(6))
            .openOn(map);
    });

</script>
</body>
</html>
