<!DOCTYPE html>
<html>
<head>
    <title>WagnerMap Esri</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; } /* Убираем отступы у body */
        #map { height: 100vh; width: 100%; } /* Карта на весь экран */
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        // 1. Инициализация карты
        var map = L.map('map').setView([55.75, 37.61], 10); // <-- Поставь свои начальные координаты и зум

        // 2. Добавление базового слоя Esri (спутниковые снимки)
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EBP, and the GIS User Community'
        }).addTo(map);

        // 3. Загрузка твоих данных (из файла data.json)
        fetch('data.json') // Убедись, что имя файла совпадает
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                L.geoJSON(data, {
                    onEachFeature: function (feature, layer) {
                        // Если есть свойства (названия, описания) в твоих данных,
                        // можно добавить всплывающее окно (popup)
                        if (feature.properties && feature.properties.name) { // Поменяй "name" на реальное имя свойства
                            layer.bindPopup("<b>" + feature.properties.name + "</b>");
                        }
                    }
                }).addTo(map);
            })
            .catch(error => {
                console.error('Ошибка загрузки GeoJSON:', error);
                alert('Не удалось загрузить данные карты. Проверьте консоль разработчика.');
            });

    </script>
</body>
</html>
