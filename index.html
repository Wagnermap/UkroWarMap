<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Military Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        #map { width: 100%; height: 100vh; }
        .leaflet-control-layers { background: rgba(20, 20, 20, 0.9) !important; color: #fff !important; border: 2px solid #444 !important; }
    </style>
</head>
<body>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map', { center: [48.3, 34.5], zoom: 6, zoomControl: false });
    L.control.zoom({ position: 'topright' }).addTo(map);

    var googleHybrid = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}');
    var esriWithLabels = L.layerGroup([L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'), L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}.png')]);
    googleHybrid.addTo(map);

    // --- ШАГ 1: СОЗДАЕМ ПЕРЕМЕННУЮ ДЛЯ НОВОГО СЛОЯ ---
    var russiaLayer = L.layerGroup().addTo(map);
    var ukraineLayer = L.layerGroup().addTo(map);
    var trenchLayer = L.layerGroup().addTo(map);
    var teethLayer = L.layerGroup().addTo(map);
    var wireLayer = L.layerGroup().addTo(map);
    // Допустим, ты хочешь добавить мины: var minesLayer = L.layerGroup().addTo(map);

    // --- ШАГ 2: ДОБАВЛЯЕМ НАЗВАНИЕ В МЕНЮ СЛЕВА ---
    var baseMaps = { "Google Hybrid": googleHybrid, "Esri + Labels": esriWithLabels };
    var overlayMaps = {
        "<b style='color: #ff4d4d;'>Russia</b>": russiaLayer,
        "<b style='color: #4d94ff;'>Ukraine</b>": ukraineLayer,
        "<b style='color: #FFA500;'>Trenches</b>": trenchLayer,
        "<b style='color: #ADD8E6;'>Dragon's Teeth</b>": teethLayer,
        "<b style='color: #888;'>Wire</b>": wireLayer
    };
    L.control.layers(baseMaps, overlayMaps, { position: 'topleft', collapsed: false }).addTo(map);

    fetch('data.json').then(res => res.json()).then(data => {
        L.geoJSON(data, {
            style: function(feature) {
                var name = (feature.properties.name || "").toLowerCase();
                
                // --- ШАГ 3: ЗАДАЕМ ЦВЕТ (ПОНИМАЕТ И РУССКИЙ И АНГЛИЙСКИЙ) ---
                if (name.includes("trench") || name.includes("окоп") || name.includes("ров")) {
                    return { color: "#FFA500", weight: 3, opacity: 1 };
                }
                if (name.includes("teeth") || name.includes("зубы")) {
                    return { color: "#ADD8E6", weight: 2 }; 
                }
                if (name.includes("wire") || name.includes("проволока")) {
                    return { color: "#777", weight: 2, dashArray: "5, 10" };
                }
                if (name.includes("ukraine") || name.includes("синяя") || name.includes("blue")) {
                    return { fillColor: "#0057b7", fillOpacity: 0.5, weight: 0, stroke: false };
                }
                
                // ПО УМОЛЧАНИЮ - ВСЁ КРАСНОЕ (Russia)
                return { fillColor: "#cc0000", fillOpacity: 0.5, weight: 0, stroke: false };
            },
            pointToLayer: function(feature, latlng) {
                var name = (feature.properties.name || "").toLowerCase();
                // Точки для зубов дракона
                if (name.includes("teeth") || name.includes("зубы")) {
                    return L.circleMarker(latlng, { radius: 3, fillColor: "#ADD8E6", color: "#4d94ff", weight: 1, fillOpacity: 1 });
                }
                // Точки для Украины
                if (name.includes("ukraine") || name.includes("синяя")) {
                    return L.circleMarker(latlng, { radius: 5, fillColor: "#0057b7", color: "white", weight: 1, fillOpacity: 0.9 });
                }
                // Все остальные точки - красные
                return L.circleMarker(latlng, { radius: 5, fillColor: "#cc0000", color: "white", weight: 1, fillOpacity: 0.9 });
            },
            onEachFeature: function (feature, layer) {
                var name = (feature.properties.name || "").toLowerCase();
                
                // --- ШАГ 4: СОРТИРОВКА ПО ГАЛОЧКАМ В МЕНЮ ---
                if (name.includes("ukraine") || name.includes("синяя") || name.includes("blue")) { 
                    layer.addTo(ukraineLayer); 
                }
                else if (name.includes("trench") || name.includes("окоп") || name.includes("ров")) { 
                    layer.addTo(trenchLayer); 
                }
                else if (name.includes("teeth") || name.includes("зубы")) { 
                    layer.addTo(teethLayer); 
                }
                else if (name.includes("wire") || name.includes("проволока")) { 
                    layer.addTo(wireLayer); 
                }
                else { 
                    layer.addTo(russiaLayer); 
                }

                if (feature.properties.name) layer.bindPopup(feature.properties.name);
            }
        });
    });
</script>
</body>
</html>
