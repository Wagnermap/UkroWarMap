<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OSINT Military Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.draw@1.0.4/dist/leaflet.draw.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0b0b0b; font-family: sans-serif; }
        #map { width: 100%; height: 100vh; }

        /* Панель поиска */
        .search-container {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 1000; width: 350px; display: flex;
            background: rgba(20, 20, 20, 0.95); padding: 6px; border-radius: 10px;
            border: 1px solid #444; box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }
        .search-container input { flex: 1; background: transparent; border: none; color: white; padding: 8px 15px; outline: none; }
        .search-container button { background: #2c85ff; color: white; border: none; padding: 8px 20px; border-radius: 6px; cursor: pointer; }

        /* Панель даты (для Sentinel) */
        .date-container {
            position: absolute; bottom: 80px; left: 20px; z-index: 1000;
            background: rgba(20, 20, 20, 0.9); padding: 10px; border-radius: 8px;
            border: 1px solid #444; color: white; display: flex; flex-direction: column; gap: 5px;
        }
        .date-container input { background: #333; border: 1px solid #555; color: white; padding: 5px; border-radius: 4px; }

        .leaflet-control-layers { background: #1a1a1a !important; color: white !important; }
        .export-button {
            position: absolute; bottom: 20px; right: 20px; z-index: 1000;
            background: #2c85ff; color: white; border: none; padding: 10px 15px;
            border-radius: 6px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="Search location or coordinates...">
    <button onclick="runSearch()">Search</button>
</div>

<div class="date-container" id="datePanel" style="display: none;">
    <label>Sentinel-2 Date:</label>
    <input type="date" id="satDate" onchange="updateSentinel()">
</div>

<div id="map"></div>
<button class="export-button" onclick="exportDrawnData()">Export GeoJSON</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://unpkg.com/leaflet.draw@1.0.4/dist/leaflet.draw.js"></script>

<script>
    // Инициализация карты
    var map = L.map('map', { center: [47.5, 36.5], zoom: 10, zoomControl: false });
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    // --- СЛОИ СПУТНИКОВ ---

    // 1. Google Hybrid (Высокое качество)
    var googleHybrid = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 20 });

    // 2. ESRI World Imagery (Высокое качество, окопы видны лучше всего)
    var esriSatellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 });

    // 3. Mapbox Satellite (Иногда новее и четче Google)
    var mapboxSat = L.tileLayer('https://api.mapbox.com/v4/mapbox.satellite/{z}/{x}/{y}.jpg90?access_token=pk.eyJ1IjoiZGVlcHN0YXRlbWFwIiwiYSI6ImNsYmZueXFicTAxeXozcm55M3I4OWV0dmMifQ', { maxZoom: 20 });

    // 4. Sentinel-2 Daily (Обновляется раз в 5 дней, но низкое разрешение)
    var sentinelLayer = L.tileLayer('', { maxZoom: 16 });

    // Функция обновления Sentinel-2 по дате
    function updateSentinel() {
        var date = document.getElementById('satDate').value;
        if (!date) return;
        
        // Используем сервис Sentinel Hub через EOX
        var url = 'https://tiles.maps.eox.at/wmts/1.0.0/s2cloudless-' + date.substring(0,4) + '/default/googlemaps-grid/{z}/{y}/{x}.jpg';
        sentinelLayer.setUrl(url);
    }

    // Установка даты по умолчанию (сегодня)
    document.getElementById('satDate').value = new Date().toISOString().split('T')[0];
    esriSatellite.addTo(map);

    // --- ГРУППЫ ДАННЫХ ---
    var Russia = L.layerGroup().addTo(map);
    var Ukraine = L.layerGroup().addTo(map);
    var Trenches = L.layerGroup().addTo(map);
    var drawnItems = new L.FeatureGroup().addTo(map);

    // --- МЕНЮ СЛОЕВ ---
    var baseMaps = {
        "Esri High-Res (Best Quality)": esriSatellite,
        "Google Hybrid": googleHybrid,
        "Mapbox High-Res": mapboxSat,
        "Sentinel-2 Daily (Updated)": sentinelLayer
    };

    var overlayMaps = {
        "<b style='color: #ff4d4d'>Russia</b>": Russia,
        "<b style='color: #2c85ff'>Ukraine</b>": Ukraine,
        "<b style='color: #ffa500'>Trenches (Static)</b>": Trenches,
        "<b style='color: #FFFF00'>Your Drawings</b>": drawnItems
    };

    L.control.layers(baseMaps, overlayMaps, { position: 'topleft', collapsed: false }).addTo(map);

    // Показ панели даты только когда включен Sentinel
    map.on('baselayerchange', function(e) {
        if (e.name === "Sentinel-2 Daily (Updated)") {
            document.getElementById('datePanel').style.display = 'block';
            updateSentinel();
        } else {
            document.getElementById('datePanel').style.display = 'none';
        }
    });

    // --- ПОИСК ---
    function runSearch() {
        var query = document.getElementById('searchInput').value;
        $.getJSON('https://nominatim.openstreetmap.org/search?format=json&q=' + query, function(data) {
            if (data.length > 0) map.setView([data[0].lat, data[0].lon], 13);
        });
    }

    // --- РИСОВАНИЕ ---
    var drawControl = new L.Control.Draw({
        edit: { featureGroup: drawnItems },
        draw: {
            polyline: { shapeOptions: { color: '#ffff00', weight: 4 } },
            polygon: { shapeOptions: { color: '#ff7800', fillOpacity: 0.3 } },
            circle: false, rectangle: true, marker: true
        }
    });
    map.addControl(drawControl);

    map.on(L.Draw.Event.CREATED, function (e) {
        drawnItems.addLayer(e.layer);
    });

    // Экспорт
    function exportDrawnData() {
        var data = drawnItems.toGeoJSON();
        var blob = new Blob([JSON.stringify(data)], {type: "application/json"});
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url; a.download = "my_trenches.geojson"; a.click();
    }

    // Координаты по правому клику
    map.on('contextmenu', function(e) {
        alert("Coords: " + e.latlng.lat.toFixed(6) + ", " + e.latlng.lng.toFixed(6));
    });

</script>
</body>
</html>
