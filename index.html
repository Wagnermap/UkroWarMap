<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Карта</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        #map { width: 100%; height: 100vh; }
        /* Кнопка слоев будет заметнее */
        .leaflet-control-layers { border: 2px solid rgba(0,0,0,0.2); background-clip: padding-box; }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // 1. Создаем карту
    var map = L.map('map').setView([48.5, 31.2], 6);

    // 2. Определяем слои спутника
    var googleSat = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
        attribution: 'Google Satellite'
    });

    var esriSat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Esri Satellite'
    });

    // 3. Сразу добавляем Google на карту, чтобы она не была пустой
    googleSat.addTo(map);

    // 4. Добавляем переключатель слоев в угол (ТЕПЕРЬ ОН ТОЧНО БУДЕТ)
    var baseLayers = {
        "Google (Новый)": googleSat,
        "Esri (Старый)": esriSat
    };
    L.control.layers(baseLayers).addTo(map);

    // 5. Загружаем данные из data.json
    fetch('data.json')
        .then(function(res) { return res.json(); })
        .then(function(data) {
            L.geoJSON(data, {
                style: function() {
                    return {
                        fillColor: "red",
                        fillOpacity: 0.6,
                        color: "red",
                        weight: 0,
                        stroke: false
                    };
                },
                pointToLayer: function(feature, latlng) {
                    return L.circleMarker(latlng, {
                        radius: 6,
                        fillColor: "red",
                        color: "#fff",
                        weight: 1,
                        fillOpacity: 0.9
                    });
                },
                onEachFeature: function (feature, layer) {
                    if (feature.properties && feature.properties.name) {
                        layer.bindPopup(feature.properties.name);
                    }
                }
            }).addTo(map);
        })
        .catch(function(err) {
            console.log("Данные из data.json не загрузились, но карта работает.");
        });
</script>

</body>
</html>
