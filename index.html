<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>War Map</title>
    <!-- Viewport settings for responsive design on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* --- CSS Styles --- */

        /* Styles for body and html: full height, hidden overflow, dark background */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%; /* Occupies full available parent height */
            overflow: hidden; /* Hide scrollbars */
            background: #000; /* Black background */
            font-family: Arial, sans-serif; /* Font style */
        }

        /* Styles for the map container #map */
        #map {
            width: 100%; /* 100% width */
            height: 100vh; /* 100% viewport height */
            /* Important: leaflet.js requires parent elements to have dimensions */
        }

        /* Styles for Leaflet layer control (top-left) */
        .leaflet-control-layers {
            background: rgba(20, 20, 20, 0.9) !important; /* Semi-transparent dark background */
            color: #fff !important; /* White text */
            border: 2px solid #444 !important; /* Dark border */
            border-radius: 5px; /* Rounded corners */
            box-shadow: 0 1px 5px rgba(0,0,0,0.4); /* Shadow */
        }
        .leaflet-control-layers label {
            color: #fff; /* White color for label text */
        }
        .leaflet-control-layers-separator {
            background-color: #555 !important; /* Separator color */
        }
        /* Ensure expanded layer control isn't too wide */
        .leaflet-control-layers-expanded {
            width: auto; /* Width based on content */
            min-width: 150px; /* Minimum width */
            max-width: calc(100% - 20px); /* Maximum width on mobile */
            box-sizing: border-box;
        }

        /* Styles for coordinate search control (top-center) */
        .leaflet-control.coord-search-control {
            position: absolute; /* Absolute positioning */
            top: 10px; /* Top offset */
            left: 50%; /* 50% from left edge */
            transform: translateX(-50%); /* Center horizontally */
            z-index: 1000; /* Above all other elements */
            background: rgba(20, 20, 20, 0.9); /* Semi-transparent dark background */
            padding: 8px 12px; /* Inner padding */
            border-radius: 5px; /* Rounded corners */
            box-shadow: 0 1px 5px rgba(0,0,0,0.4); /* Shadow */
            display: flex; /* Use flexbox for inner element alignment */
            align-items: center; /* Align vertically in center */
            gap: 8px; /* Space between elements (input field and button) */
            max-width: 90%; /* Maximum width for responsiveness */
            box-sizing: border-box; /* Include padding in width calculation */
        }
        .coord-search-control input {
            background: #333; /* Dark background for input field */
            border: 1px solid #555; /* Dark border */
            color: #eee; /* Light text */
            padding: 6px 10px; /* Inner padding */
            border-radius: 3px; /* Rounded corners */
            flex-grow: 1; /* Input field takes all available space */
            font-size: 0.9em; /* Font size */
        }
        .coord-search-control button {
            background: #4CAF50; /* Green button */
            color: white; /* White text */
            border: none; /* No border */
            padding: 7px 12px; /* Inner padding */
            border-radius: 3px; /* Rounded corners */
            cursor: pointer; /* Pointer cursor */
            font-size: 0.9em; /* Font size */
            transition: background 0.2s; /* Smooth transition on hover */
            white-space: nowrap; /* Prevent button text from wrapping */
        }
        .coord-search-control button:hover {
            background: #45a049; /* Color change on hover */
        }

        /* Responsive settings for mobile devices (screen width up to 768px) */
        @media (max-width: 768px) {
            .leaflet-control-layers {
                top: 55px !important; /* Shift layer control down to avoid overlapping search */
                left: 10px !important; /* Align to left */
            }
            .coord-search-control {
                width: calc(100% - 20px); /* Almost full screen width with margins */
                left: 10px; /* Left offset */
                transform: translateX(0); /* Disable horizontal centering via transform */
                top: 10px; /* Top offset */
            }
        }
    </style>
</head>
<body>
<!-- Map container -->
<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- jQuery for JSON loading -->
<script src="https://unpkg.com/jquery@3.7.1/dist/jquery.min.js"></script>

<script>
    /* --- JavaScript Code --- */

    // Initialize Leaflet map
    var map = L.map('map', { center: [48.3, 34.5], zoom: 6, zoomControl: false });
    // Add standard zoom control to top-right corner
    L.control.zoom({ position: 'topright' }).addTo(map);

    // --- Base Layers ---
    // Google Hybrid Layer
    var googleHybrid = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
        maxZoom: 20,
        attribution: 'Google Hybrid'
    });
    // Esri + Labels Layer (satellite + text labels)
    var esriWithLabels = L.layerGroup([
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Esri World Imagery'
        }),
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}.png', {
            attribution: 'CartoDB Labels',
            pane: 'overlayPane' // To place labels above satellite imagery
        })
    ]);
    // Add Google Hybrid as default layer
    googleHybrid.addTo(map);

    // --- Feature Layers ---
    // Create layer groups for each feature type.
    // addTo(map) adds them to the map immediately.
    var Russia = L.layerGroup().addTo(map);
    var Ukraine = L.layerGroup().addTo(map);
    var Trench = L.layerGroup().addTo(map); // Re-enabled
    var Teeth = L.layerGroup().addTo(map);  // Re-enabled
    var Wire = L.layerGroup().addTo(map);   // Re-enabled

    // --- Layer Control ---
    // Define objects for layer control: base maps and overlays (our features)
    var baseMaps = {
        "Google Hybrid": googleHybrid,
        "Esri + Labels": esriWithLabels
    };
    var overlayMaps = {
        // Use HTML for styling text in layer menu
        "<b style='color: #ff4d4d;'>Russia (Default)</b>": Russia,
        "<b style='color: #00BFFF;'>Ukraine</b>": Ukraine, // Updated color to DeepSkyBlue
        "<b style='color: #FFA500;'>Trenches</b>": Trench, // Re-enabled
        "<b style='color: #ADD8E6;'>Dragon's Teeth</b>": Teeth, // Re-enabled
        "<b style='color: #888;'>Wire Fences</b>": Wire // Re-enabled
    };
    // Add layer control to top-left, make it **collapsed by default**
    L.control.layers(baseMaps, overlayMaps, { position: 'topleft', collapsed: true }).addTo(map);

    // --- Feature: Coordinate Search Control ---
    // Create a custom Leaflet control
    var CoordSearchControl = L.Control.extend({
        onAdd: function(map) {
            var div = L.DomUtil.create('div', 'leaflet-control coord-search-control');
            div.innerHTML = `
                <input type="text" id="coordInput" placeholder="Latitude, Longitude (e.g., 48.5, 34.5)">
                <button id="searchCoordBtn">Search</button>
            `;

            // Prevent click/scroll events from propagating to the map
            L.DomEvent.disableClickPropagation(div);
            L.DomEvent.disableScrollPropagation(div);

            // Add click handler to search button
            div.querySelector('#searchCoordBtn').addEventListener('click', function() {
                var input = div.querySelector('#coordInput').value;
                var parts = input.split(',').map(s => parseFloat(s.trim()));

                if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
                    var lat = parts[0];
                    var lon = parts[1];
                    if (lat >= -90 && lat <= 90 && lon >= -180 && lon <= 180) {
                        map.setView([lat, lon], 12); // Move map and set zoom
                        // Remove previous marker if it existed
                        if (this._searchMarker) {
                            map.removeLayer(this._searchMarker);
                        }
                        // Create and add new marker, open popup
                        this._searchMarker = L.marker([lat, lon]).addTo(map)
                            .bindPopup(`Coordinates: ${lat.toFixed(4)}, ${lon.toFixed(4)}`).openPopup();
                    } else {
                        alert('Invalid coordinates. Latitude must be between -90 and 90, Longitude between -180 and 180.');
                    }
                } else {
                    alert('Please enter coordinates in "Latitude, Longitude" format.');
                }
            });
            return div;
        },
        onRemove: function(map) { /* Cleanup on control removal */ }
    });
    // Add created search control to the map
    new CoordSearchControl().addTo(map);

    // --- Feature: Display coordinates on long press / right click ---
    // Listen for 'contextmenu' event (right click or long press)
    map.on('contextmenu', function(e) {
        var lat = e.latlng.lat.toFixed(4); // Get latitude
        var lon = e.latlng.lng.toFixed(4); // Get longitude
        // Create and open popup with coordinates
        L.popup()
            .setLatLng(e\ 
.latlng)
            .setContent(`<b>Coordinates:</b><br>${lat}, ${lon}`)
            .openOn(map);
    });

    // --- Function to load GeoJSON data ---
    // Takes file URL and layer group for adding data
    function loadGeoJson(url, layerGroup) {
        // Use $.getJSON to load data from specified URL
        $.getJSON(url, function(data) {
            // Create GeoJSON layer
            L.geoJSON(data, {
                style: featureStyle, // Apply styling function for polygons/lines
                pointToLayer: featurePointToLayer, // Apply function for creating markers for points
                onEachFeature: function(feature, layer) { // Function to process each GeoJSON feature
                    layer.addTo(layerGroup); // Add feature to the corresponding layer group
                    // If feature has 'name' property, bind popup
                    if (feature.properties.name) {
                        layer.bindPopup(feature.properties.name);
                    }
                }
            });
        }).fail(function(jqxhr, textStatus, error) { // Handle file loading errors
            var err = textStatus + ", " + error;
            console.error(`Error loading ${url}: ${err}`);
            alert(`Error loading ${url}: ${err}. Ensure the file exists and is correctly formatted.`);
        });
    }

    // --- GeoJSON Styling and Feature Creation Functions ---

    // Style for polygons and lines
    function featureStyle(feature) {
        var name = (feature.properties.name || "").toLowerCase(); // Feature name in lowercase
        // Define style based on feature name
        if (name.includes("trench")) return { color: "#FFA500", weight: 3, opacity: 1 };
        if (name.includes("teeth")) return { color: "#ADD8E6", weight: 2, opacity: 1 };
        if (name.includes("wire")) return { color: "#777", weight: 2, dashArray: "5, 10", opacity: 0.8 };
        // Ukraine layer: DeepSkyBlue, slightly more opaque
        if (name.includes("ukraine") || name.includes("blue")) return { fillColor: "#00BFFF", fillOpacity: 0.6, weight: 1, color: "#00BFFF", opacity: 0.9 };
        // Russia layer: more transparent, no border
        return { fillColor: "#cc0000", fillOpacity: 0.15, weight: 0, color: 'transparent', opacity: 0 }; // No border for polygons
    }

    // Style for point features (creating markers)
    function featurePointToLayer(feature, latlng) {
        var name = (feature.properties.name || "").toLowerCase();
        // Create different marker types based on feature type
        if (name.includes("teeth")) return L.circleMarker(latlng, { radius: 3, fillColor: "#ADD8E6", color: "#4d94ff", weight: 1, fillOpacity: 1 });
        if (name.includes("ukraine")) return L.circleMarker(latlng, { radius: 5, fillColor: "#00BFFF", color: "white", weight: 1, fillOpacity: 0.9 });
        // Russia point marker: transparent border
        return L.circleMarker(latlng, { radius: 5, fillColor: "#cc0000", color: "transparent", weight: 0, fillOpacity: 0.9 }); // No border for points
    }

    // --- Load GeoJSON Data ---
    // Load data from individual GeoJSON files in 'data' folder and add to respective layer groups
    loadGeoJson("data/ukraine.json", Ukraine);
    loadGeoJson("data/russia.json", Russia);
    loadGeoJson("data/trenches.json", Trench); // Re-enabled
    loadGeoJson("data/teeth.json", Teeth);     // Re-enabled
    loadGeoJson("data/wire.json", Wire);       // Re-enabled

</script>
</body>
</html>
