<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Карта Украины</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        #map { width: 100%; height: 100vh; }
        /* Стиль панели управления слева */
        .leaflet-control-layers { 
            background: rgba(20, 20, 20, 0.9) !important; 
            color: #fff !important; 
            border: 2px solid #444 !important;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // 1. Создаем карту (Центр и зум)
    var map = L.map('map', {
        center: [48.3, 34.5],
        zoom: 6,
        zoomControl: false // Убираем стандартные кнопки зума
    });

    // Добавим зум в правый угол, чтобы не мешал
    L.control.zoom({ position: 'topright' }).addTo(map);

    // 2. СЛОИ СПУТНИКА
    
    // САМЫЙ БЫСТРЫЙ (Google Hybrid: спутник + названия)
    var googleHybrid = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
        attribution: 'Google Hybrid'
    });

    // Слой Esri
    var esriSat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Esri Satellite'
    });

    // Слой названий (прозрачный), чтобы наложить на Esri
    var labels = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}.png', {
        pane: 'markerPane' // Названия всегда будут сверху всего
    });

    // Группа: Esri + Названия
    var esriWithLabels = L.layerGroup([esriSat, labels]);

    // 3. ГРУППА ДЛЯ ТВОИХ ДАННЫХ
    var myDataLayer = L.layerGroup();

    // Добавляем всё на карту по умолчанию
    googleHybrid.addTo(map);
    myDataLayer.addTo(map);

    // 4. ПАНЕЛЬ УПРАВЛЕНИЯ СЛЕВА
    var baseMaps = {
        "Google (Самый новый)": googleHybrid,
        "Esri + Названия": esriWithLabels
    };

    var overlayMaps = {
        "<b style='color: red;'>МОИ КРАСНЫЕ ЗОНЫ</b>": myDataLayer
    };

    L.control.layers(baseMaps, overlayMaps, { 
        position: 'topleft', 
        collapsed: false 
    }).addTo(map);

    // 5. ЗАГРУЗКА data.json
    fetch('data.json')
        .then(function(res) { return res.json(); })
        .then(function(data) {
            L.geoJSON(data, {
                style: function() {
                    return {
                        fillColor: "red",
                        fillOpacity: 0.6,
                        weight: 0, // Убрал границы совсем
                        stroke: false
                    };
                },
                pointToLayer: function(feature, latlng) {
                    return L.circleMarker(latlng, {
                        radius: 6,
                        fillColor: "red",
                        color: "#fff",
                        weight: 1,
                        fillOpacity: 0.9
                    });
                },
                onEachFeature: function (feature, layer) {
                    if (feature.properties && feature.properties.name) {
                        layer.bindPopup(feature.properties.name);
                    }
                }
            }).addTo(myDataLayer);
        });
</script>

</body>
</html>
