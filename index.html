<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Military Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        #map { width: 100%; height: 100vh; }
        .leaflet-control-layers { 
            background: rgba(20, 20, 20, 0.9) !important; 
            color: #fff !important; 
            border: 2px solid #444 !important;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    var map = L.map('map', { center: [48.3, 34.5], zoom: 6, zoomControl: false });
    L.control.zoom({ position: 'topright' }).addTo(map);

    // --- Спутниковые слои (Sentinel убран) ---
    var googleHybrid = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}');
    var esriWithLabels = L.layerGroup([
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'),
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}.png')
    ]);
    googleHybrid.addTo(map);

    // --- Группы для твоих слоев ---
    var russiaLayer = L.layerGroup().addTo(map);
    var ukraineLayer = L.layerGroup().addTo(map);
    var trenchLayer = L.layerGroup().addTo(map);
    var teethLayer = L.layerGroup().addTo(map);
    var wireLayer = L.layerGroup().addTo(map);

    // --- Меню управления ---
    var baseMaps = { "Google Hybrid": googleHybrid, "Esri + Labels": esriWithLabels };
    var overlayMaps = {
        "<b style='color: #ff4d4d;'>Russia</b>": russiaLayer,
        "<b style='color: #ADD8E6;'>Ukraine</b>": ukraineLayer,
        "<b style='color: #FFA500;'>Trenches</b>": trenchLayer,
        "<b style='color: #ADD8E6;'>Dragon's Teeth</b>": teethLayer,
        "<b style='color: #888;'>Barbed Wire</b>": wireLayer
    };
    L.control.layers(baseMaps, overlayMaps, { position: 'topleft', collapsed: false }).addTo(map);

    // --- Функция для загрузки слоев ---
    function loadLayer(url, layerGroup, styleOptions, isPoint = false) {
        fetch(url)
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    style: styleOptions,
                    pointToLayer: function(feature, latlng) {
                        if (isPoint) {
                            return L.circleMarker(latlng, styleOptions);
                        }
                    },
                    onEachFeature: function(feature, layer) {
                        if (feature.properties && feature.properties.name) {
                            layer.bindPopup(feature.properties.name);
                        }
                    }
                }).addTo(layerGroup);
            })
            .catch(err => console.log("Файл не найден: " + url));
    }

    // --- ЗАГРУЗКА ВСЕХ ФАЙЛОВ ИЗ ПАПКИ DATA ---

    // 1. Россия (красный) - убедись, что файл russia.geojson там есть
    loadLayer('data/russia.geojson', russiaLayer, { fillColor: "#cc0000", fillOpacity: 0.5, weight: 0, stroke: false });

    // 2. Украина (светло-синий)
    loadLayer('data/ukraine.json', ukraineLayer, { fillColor: "#ADD8E6", fillOpacity: 0.5, weight: 0, stroke: false });

    // 3. Окопы/Рвы (оранжевый)
    loadLayer('data/ditches.geojson', trenchLayer, { color: "#FFA500", weight: 3, opacity: 1 });

    // 4. Зубы дракона (светло-голубые точки)
    loadLayer('data/teeth.geojson', teethLayer, { radius: 3, fillColor: "#ADD8E6", color: "#4d94ff", weight: 1, fillOpacity: 1 }, true);

    // 5. Проволока (серый пунктир)
    loadLayer('data/wire.geojson', wireLayer, { color: "#888", weight: 2, dashArray: "5, 10" });

</script>
</body>
</html>
