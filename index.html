<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Карта укреплений</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #1a1a1a; overflow: hidden; }
        #map { width: 100%; height: 100vh; }
        
        /* Панель даты снизу */
        #timeline-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 10px;
            z-index: 1000;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        input[type=range] { width: 100%; cursor: pointer; }
        .date-display { font-size: 18px; font-weight: bold; margin-bottom: 5px; }
        
        /* Скрытие лишних элементов */
        .leaflet-draw, .leaflet-control-export { display: none !important; }
    </style>
</head>
<body>

<div id="map"></div>

<div id="timeline-container">
    <div class="date-display" id="current-date">Дата: Все время</div>
    <input type="range" id="date-slider" min="0" max="100" value="100">
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 1. Настройка карты (темная тема)
    const map = L.map('map').setView([47.5, 37.5], 7);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    // 2. Логика цветов
    function getStyle(feature, sourceFile) {
        // Если это файл с окопами
        if (sourceFile.includes('trenches.json')) {
            return { color: "yellow", weight: 3, opacity: 0.8 };
        }
        // Если файл из папки russia
        if (sourceFile.includes('/russia/')) {
            return { color: "red", weight: 2, opacity: 0.7 };
        }
        // Цвет по умолчанию для остальных
        return { color: "#3388ff", weight: 2, opacity: 0.6 };
    }

    // 3. Список файлов для загрузки (укажите свои пути здесь)
    const files = [
        'data/trenches.json',
        'data/russia/fortifications_line.json',
        'data/others/base.json'
    ];

    let allLayers = [];

    // 4. Загрузка данных
    files.forEach(file => {
        fetch(file)
            .then(res => res.json())
            .then(data => {
                const layer = L.geoJSON(data, {
                    style: (feature) => getStyle(feature, file),
                    onEachFeature: (feature, layer) => {
                        if (feature.properties && feature.properties.date) {
                            layer.options.time = new Date(feature.properties.date).getTime();
                        }
                    }
                }).addTo(map);
                allLayers.push(layer);
            })
            .catch(err => console.log("Файл не найден:", file));
    });

    // 5. Логика временной шкалы (Фильтр по дате)
    const slider = document.getElementById('date-slider');
    const dateDisplay = document.getElementById('current-date');

    slider.oninput = function() {
        // В реальном файле Брэди Африка есть поле "time" или "observed"
        // Здесь мы просто имитируем фильтрацию
        const val = this.value;
        dateDisplay.innerText = "Прогресс: " + val + "%";
        
        allLayers.forEach(layer => {
            layer.eachLayer(l => {
                // Если у объекта есть свойство даты, мы его скрываем/показываем
                // l.setStyle({opacity: 0.1}); // пример
            });
        });
    };

</script>
</body>
</html>
