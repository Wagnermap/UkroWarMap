<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Военная Карта</title>
    <!-- Настройка viewport для корректного отображения на мобильных устройствах -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <!-- Подключение CSS Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* --- CSS Стили --- */

        /* Стили для body и html: занимают всю высоту, скрывают прокрутку, темный фон */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%; /* Занимает всю доступную высоту родителя */
            overflow: hidden; /* Убираем полосы прокрутки */
            background: #000; /* Черный фон */
            font-family: Arial, sans-serif; /* Шрифт */
        }

        /* Стили для контейнера карты #map */
        #map {
            width: 100%; /* 100% ширины */
            height: 100vh; /* 100% высоты видимой области (viewport height) */
            /* Важно: leaflet.js требует, чтобы родительские элементы имели размеры */
        }

        /* Стили для контрола слоев Leaflet (левый верхний угол) */
        .leaflet-control-layers {
            background: rgba(20, 20, 20, 0.9) !important; /* Полупрозрачный темный фон */
            color: #fff !important; /* Белый текст */
            border: 2px solid #444 !important; /* Темная рамка */
            border-radius: 5px; /* Скругленные углы */
            box-shadow: 0 1px 5px rgba(0,0,0,0.4); /* Тень */
        }
        .leaflet-control-layers label {
            color: #fff; /* Белый цвет для текста меток */
        }
        .leaflet-control-layers-separator {
            background-color: #555 !important; /* Цвет разделителя */
        }
        /* Убедимся, что открытый контрол слоев не слишком широкий */
        .leaflet-control-layers-expanded {
            width: auto; /* Ширина по содержимому */
            min-width: 150px; /* Минимальная ширина */
            max-width: calc(100% - 20px); /* Максимальная ширина на мобильных */
            box-sizing: border-box;
        }

        /* Стили для контрола поиска координат (сверху по центру) */
        .leaflet-control.coord-search-control {
            position: absolute; /* Абсолютное позиционирование */
            top: 10px; /* Отступ сверху */
            left: 50%; /* На 50% от левого края */
            transform: translateX(-50%); /* Центрирование по горизонтали */
            z-index: 1000; /* Поверх всех других элементов */
            background: rgba(20, 20, 20, 0.9); /* Полупрозрачный темный фон */
            padding: 8px 12px; /* Внутренние отступы */
            border-radius: 5px; /* Скругленные углы */
            box-shadow: 0 1px 5px rgba(0,0,0,0.4); /* Тень */
            display: flex; /* Используем flexbox для выравнивания элементов внутри */
            align-items: center; /* Выравнивание по центру по вертикали */
            gap: 8px; /* Расстояние между элементами (поле ввода и кнопка) */
            max-width: 90%; /* Максимальная ширина для адаптивности */
            box-sizing: border-box; /* Учитываем padding в расчете ширины */
        }
        .coord-search-control input {
            background: #333; /* Темный фон поля ввода */
            border: 1px solid #555; /* Темная рамка */
            color: #eee; /* Светлый текст */
            padding: 6px 10px; /* Внутренние отступы */
            border-radius: 3px; /* Скругленные углы */
            flex-grow: 1; /* Поле ввода занимает все доступное пространство */
            font-size: 0.9em; /* Размер шрифта */
        }
        .coord-search-control button {
            background: #4CAF50; /* Зеленая кнопка */
            color: white; /* Белый текст */
            border: none; /* Без рамки */
            padding: 7px 12px; /* Внутренние отступы */
            border-radius: 3px; /* Скругленные углы */
            cursor: pointer; /* Курсор-указатель */
            font-size: 0.9em; /* Размер шрифта */
            transition: background 0.2s; /* Плавный переход при наведении */
            white-space: nowrap; /* Чтобы кнопка не переносилась на новую строку */
        }
        .coord-search-control button:hover {
            background: #45a049; /* Изменение цвета при наведении */
        }

        /* Адаптивные настройки для мобильных устройств (ширина экрана до 768px) */
        @media (max-width: 768px) {
            .leaflet-control-layers {
                top: 55px !important; /* Смещаем контрол слоев ниже, чтобы не перекрывать поиск */
                left: 10px !important; /* Выравнивание по левому краю */
            }
            .coord-search-control {
                width: calc(100% - 20px); /* Почти на всю ширину экрана с отступами */
                left: 10px; /* Отступ слева */
                transform: translateX(0); /* Отключаем центрирование через transform */
                top: 10px; /* Отступ сверху */
            }
        }
    </style>
</head>
<body>
<!-- Контейнер для карты -->
<div id="map"></div>

<!-- Подключение Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- Подключение jQuery для загрузки JSON -->
<script src="https://unpkg.com/jquery@3.7.1/dist/jquery.min.js"></script>

<script>
    /* --- JavaScript Код --- */

    // Инициализация карты Leaflet
    var map = L.map('map', { center: [48.3, 34.5], zoom: 6, zoomControl: false });
    // Добавляем стандартный контрол зума в правый верхний угол
    L.control.zoom({ position: 'topright' }).addTo(map);

    // --- Базовые слои ---
    // Google Hybrid слой
    var googleHybrid = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
        maxZoom: 20,
        attribution: 'Google Hybrid'
    });
    // Esri + Labels слой (спутник + текстовые метки)
    var esriWithLabels = L.layerGroup([
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Esri World Imagery'
        }),
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}.png', {
                });
DB Labels',
            pane: 'overlayPane' // Чтобы метки были поверх спутника
        })
    ]);
    // Добавляем Google Hybrid как слой по умолчанию
    googleHybrid.addTo(map);

    // --- Слои для объектов ---
    // Создаем группы слоев для каждого типа объектов.
    // addTo(map) добавляет их на карту сразу.
    var Russia = L.layerGroup().addTo(map);
    var Ukraine = L.layerGroup().addTo(map);
    var Trench = L.layerGroup().addTo(map);
    var Teeth = L.layerGroup().addTo(map);
    var Wire = L.layerGroup().addTo(map);

    // --- Контрол слоев ---
    // Определяем объекты для контрола слоев: базовые карты и оверлеи (наши объекты)
    var baseMaps = {
        "Google Hybrid": googleHybrid,
        "Esri + Labels": esriWithLabels
    };
    var overlayMaps = {
        // Используем HTML для стилизации текста в меню слоев
        "<b style='color: #ff4d4d;'>Россия (по умолчанию)</b>": Russia,
        "<b style='color: #4d94ff;'>Украина</b>": Ukraine,
        "<b style='color: #FFA500;'>Окопы</b>": Trench,
        "<b style='color: #ADD8E6;'>Зубы дракона</b>": Teeth,
        "<b style='color: #888;'>Проволочные заграждения</b>": Wire
    };
    // Добавляем контрол слоев в левый верхний угол, делаем его **свернутым по умолчанию**
    L.control.layers(baseMaps, overlayMaps, { position: 'topleft', collapsed: true }).addTo(map);

    // --- Функционал: Контрол поиска по координатам ---
    // Создаем пользовательский контрол Leaflet
    var CoordSearchControl = L.Control.extend({
        onAdd: function(map) {
            var div = L.DomUtil.create('div', 'leaflet-control coord-search-control');
            div.innerHTML = `
                <input type="text" id="coordInput" placeholder="Широта, Долгота (например, 48.5, 34.5)">
                <button id="searchCoordBtn">Найти</button>
            `;

            // Предотвращаем "просачивание" событий мыши/касания на карту
            L.DomEvent.disableClickPropagation(div);
            L.DomEvent.disableScrollPropagation(div);

            // Добавляем обработчик клика на кнопку поиска
            div.querySelector('#searchCoordBtn').addEventListener('click', function() {
                var input = div.querySelector('#coordInput').value;
                var parts = input.split(',').map(s => parseFloat(s.trim()));

                if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
                    var lat = parts[0];
                    var lon = parts[1];
                    if (lat >= -90 && lat <= 90 && lon >= -180 && lon <= 180) {
                        map.setView([lat, lon], 12); // Перемещаем карту и устанавливаем зум
                        // Удаляем предыдущий маркер, если он был
                        if (this._searchMarker) {
                            map.removeLayer(this._searchMarker);
                        }
                        // Создаем и добавляем новый маркер, открываем попап
                        this._searchMarker = L.marker([lat, lon]).addTo(map)
                            .bindPopup(`Координаты: ${lat.toFixed(4)}, ${lon.toFixed(4)}`).openPopup();
                    } else {
                        alert('Некорректные координаты. Широта должна быть от -90 до 90, Долгота от -180 до 180.');
                    }
                } else {
                    alert('Пожалуйста, введите координаты в формате "Широта, Долгота".');
                }
            });
            return div;
        },
        onRemove: function(map) { /* Очистка при удалении контрола */ }
    });
    // Добавляем созданный контрол поиска на карту
    new CoordSearchControl().addTo(map);

    // --- Функционал: Отображение координат по долгому нажатию / правому клику ---
    // Слушаем событие 'contextmenu' (правый клик или долгое нажатие)
    map.on('contextmenu', function(e) {
        var lat = e.latlng.lat.toFixed(4); // Получаем широту
        var lon = e.latlng.lng.toFixed(4); // Получаем долготу
        // Создаем и открываем всплывающее окно с координатами
        L.popup()
            .setLatLng(e.latlng)
            .setContent(`<b>Координаты:</b><br>${lat}, ${lon}`)
            .openOn(map);
    });

    // --- Функция для загрузки GeoJSON данных ---
    // Принимает URL файла и группу слоев для добавления данных
    function loadGeoJson(url, layerGroup) {
        // Используем $.getJSON для загрузки данных из указанного URL
        $.getJSON(url, function(data) {
            // Создаем слой GeoJSON
            L.geoJSON(data, {
                style: featureStyle, // Применяем функцию стилизации полигонов/линий
                pointToLayer: featurePointToLayer, // Применяем функцию создания маркеров для точек
                onEachFeature: function(feature, layer) { // Функция для обработки каждого объекта GeoJSON
                    layer.addTo(layerGroup); // Добавляем объект в соответствующую группу слоев
                    // Если у объекта есть свойство 'name', привязываем всплывающее окно
                    if (feature.properties.name) {
                        layer.bindPopup(feature.properties.name);
                    }
                }
            });
        }).fail(function(jqxhr, textStatus, error) { // Обработка ошибки загрузки файла
            var err = textStatus + ", " + error;
            console.error(`Ошибка загрузки ${url}: ${err}`);
            alert(`Ошибка загрузки ${url}: ${err}. Убедитесь, что файл существует и корректно отформатирован.`);
        });
    }

    // --- Функции стилизации и создания объектов GeoJSON ---

    // Стиль для полигонов и линий
    function featureStyle(feature) {
        var name = (feature.properties.name || "").toLowerCase(); // Имя объекта в нижнем регистре
        // Определяем стиль в зависимости от имени объекта
        if (name.includes("trench") || name.includes("окоп") || name.includes("ров")) return { color: "#FFA500", weight: 3, opacity: 1 };
        if (name.includes("teeth") || name.includes("зубы")) return { color: "#ADD8E6", weight: 2, opacity: 1 };
        if (name.includes("wire") || name.includes("проволока")) return { color: "#777", weight: 2, dashArray: "5, 10", opacity: 0.8 };
        // Увеличена прозрачность украинского слоя для лучшей видимости
        if (name.includes("ukraine") || name.includes("синяя") || name.includes("blue")) return { fillColor: "#0057b7", fillOpacity: 0.6, weight: 1, color: "#0057b7", opacity: 0.9 };
        // Стиль по умолчанию для объектов России (полигоны)
        return { fillColor: "#cc0000", fillOpacity: 0.4, weight: 1, color: "#cc0000", opacity: 0.8 };
    }

    // Стиль для точечных объектов (создание маркеров)
    function featurePointToLayer(feature, latlng) {
        var name = (feature.properties.name || "").toLowerCase();
        // Создаем маркеры разного вида в зависимости от типа объекта
        if (name.includes("teeth") || name.includes("зубы")) return L.circleMarker(latlng, { radius: 3, fillColor: "#ADD8E6", color: "#4d94ff", weight: 1, fillOpacity: 1 });
        if (name.includes("ukraine") || name.includes("синяя")) return L.circleMarker(latlng, { radius: 5, fillColor: "#0057b7", color: "white", weight: 1, fillOpacity: 0.9 });
        // Маркер по умолчанию для точек (для объектов России)
        return L.circleMarker(latlng, { radius: 5, fillColor: "#cc0000", color: "white", weight: 1, fillOpacity: 0.9 });
    }

    // --- Загрузка GeoJSON данных ---
    // Загружаем данные из отдельных файлов в папке 'data' и добавляем их в соответствующие группы слоев
    loadGeoJson("data/ukraine.json", Ukraine);
    loadGeoJson("data/russia\ 
.json", Russia);
    loadGeoJson("data/trenches.json", Trench);
    loadGeoJson("data/teeth.json", Teeth);
    loadGeoJson("data/wire.json", Wire);

</script>
</body>
</html>
