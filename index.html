<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>War Map Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0b0b0b; font-family: sans-serif; }
        #map { width: 100%; height: 100vh; }

        /* Search Bar Centered */
        .search-container {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: 350px;
            display: flex;
            background: rgba(20, 20, 20, 0.95);
            padding: 6px;
            border-radius: 10px;
            border: 1px solid #444;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }
        .search-container input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 8px 15px;
            outline: none;
            font-size: 14px;
        }
        .search-container button {
            background: #2c85ff;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Dark Theme Layers Control */
        .leaflet-control-layers {
            background: #1a1a1a !important;
            color: white !important;
            border: 1px solid #333 !important;
            border-radius: 8px;
        }
        .leaflet-control-layers label { color: white !important; }
        .leaflet-control-layers-expanded { padding: 10px; }
    </style>
</head>
<body>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="Search: City, Village or Lat, Lon">
    <button onclick="runSearch()">Search</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/jquery@3.7.1/dist/jquery.min.js"></script>

<script>
    // Initialize map
    var map = L.map('map', { center: [48.3, 34.5], zoom: 6, zoomControl: false });
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    // --- BASE LAYERS ---
    
    // 1. Google Hybrid
    var googleHybrid = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
        maxZoom: 20, attribution: 'Google'
    });

    // 2. ESRI WORLD IMAGERY (Default for high-res)
    var esriSatellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Esri World Imagery', maxZoom: 19
    });

    // 3. SENTINEL-2 CLOUDLESS (MOST RECENT GLOBAL - LOWER RES)
    var sentinel2 = L.tileLayer('https://tiles.maps.eox.at/wmts/1.0.0/s2cloudless-2023/default/googlemaps-grid/{z}/{y}/{x}.jpg', {
        attribution: 'Sentinel-2 EOX', maxZoom: 16
    });

    // 4. NASA FIRMS (Active Fires / Explosions - 24h)
    var nasaFirms = L.tileLayer('https://firms.modaps.eosdis.nasa.gov/mapserver/wms/v1/currect/?SERVICE=WMS&VERSION=1.1.1&REQUEST=GetMap&LAYERS=fires_viirs_snpp&STYLES=&FORMAT=image/png&TRANSPARENT=true&HEIGHT=256&WIDTH=256&SRS=EPSG:3857&BBOX={bbox}', {
        attribution: 'NASA FIRMS'
    });

    // Set Esri Satellite as the default base layer
    esriSatellite.addTo(map);

    // --- FEATURE GROUPS ---
    var Russia = L.layerGroup().addTo(map);
    var Ukraine = L.layerGroup().addTo(map);
    var Trenches = L.layerGroup().addTo(map);
    var Teeth = L.layerGroup().addTo(map);
    var Wire = L.layerGroup().addTo(map);
    // AirDefense layer group removed

    // --- LAYER CONTROL ---
    var baseMaps = {
        "Esri High-Res": esriSatellite,
        "Google Hybrid": googleHybrid,
        "Sentinel-2 (Latest)": sentinel2
    };
    var overlayMaps = {
        "<b style='color: #ff4d4d'>Russia (Occupied)</b>": Russia,
        "<b style='color: #2c85ff'>Ukraine</b>": Ukraine,
        "<b style='color: #ffa500'>Trenches</b>": Trenches,
        "<b style='color: #ADD8E6'>Dragon's Teeth</b>": Teeth,
        "<b style='color: #888'>Wire Fence</b>": Wire,
        "<b style='color: #ff0000'>Active Fires (NASA)</b>": nasaFirms
        // AirDefense overlay removed
    };
    L.control.layers(baseMaps, overlayMaps, { position: 'topleft', collapsed: false }).addTo(map);

    // --- SEARCH LOGIC ---
    var currentMarker;
    function runSearch() {
        var query = document.getElementById('searchInput').value.trim();
        if (!query) return;

        // Coordinates check
        var parts = query.split(',').map(Number);
        if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
            var latlng = [parts[0], parts[1]];
            map.setView(latlng, 12);
            mark(latlng, "Coords: " + query);
        } else {
            // City/Village search
            $.getJSON('https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(query), function(data) {
                if (data.length > 0) {
                    var loc = [data[0].lat, data[0].lon];
                    map.setView(loc, 12);
                    mark(loc, data[0].display_name);
                } else {
                    alert("Location not found");
                }
            });
        }
    }

    function mark(latlng, title) {
        if (currentMarker) map.removeLayer(currentMarker);
        currentMarker = L.marker(latlng).addTo(map).bindPopup(title).openPopup();
    }

    // --- STYLING for LINES and POLYGONS (GeoJSON data for countries, trenches etc.) ---
    function styleFeature(feature) {
        var name = (feature.properties.name || "").toLowerCase();
        
        // UKRAINE - Blue
        if (name.includes("ukraine") || name.includes("ua")) {
            return { color: "#2c85ff", fillColor: "#2c85ff", fillOpacity: 0.5, weight: 1.5 };
        }
        
        // RUSSIA - Transparent Red, NO BORDER
if (name.includes("russia") || name.includes("ru")) {
            return { color: "transparent", fillColor: "#d11919", fillOpacity: 0.15, weight: 0 };
        }

        // TRENCHES - Orange
        if (name.includes("trench")) return { color: "#ffa500", weight: 3 };
        // TEETH - Light Blue
        if (name.includes("teeth")) return { color: "#ADD8E6", weight: 2 };
        // WIRE - Grey Dash
        if (name.includes("wire")) return { color: "#888", weight: 2, dashArray: "5, 10" };

        return { color: "grey", weight: 1 }; // Default style for unknown features
    }

    // --- DATA LOADING ---
    function loadGeo(url, group) { // Simplified loadGeo, no longer needs isPointsLayer
        $.getJSON(url, function(data) {
            L.geoJSON(data, {
                style: styleFeature, // Always use styleFeature for remaining data
                onEachFeature: function(f, l) {
                    if (f.properties.name) l.bindPopup(f.properties.name);
                    l.addTo(group);
                }
            });
        }).fail(function() { console.log("Missing or broken file: " + url); });
    }

    // Load GeoJSON data
    loadGeo("data/ukraine.json", Ukraine);
    loadGeo("data/russia.json", Russia);
    loadGeo("data/trenches.json", Trenches);
    loadGeo("data/teeth.json", Teeth);
    loadGeo("data/wire.json", Wire);
    // loadGeo("data/air_defense_sample.json", AirDefense, true); -- Air Defense data loading removed

    // Right-click for coordinates
    map.on('contextmenu', function(e) {
        L.popup().setLatLng(e.latlng)
            .setContent("Coordinates: " + e.latlng.lat.toFixed(5) + ", " + e.latlng.lng.toFixed(5))
            .openOn(map);
    });

</script>
</body>
</html>
