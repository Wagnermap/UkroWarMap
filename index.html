<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Военная Карта</title>
    <!-- Убедитесь, что viewport настроен правильно для мобильных -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <!-- Подключение Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* --- CSS Стили --- */

        /* Стили для body и html: занимают всю высоту, скрывают прокрутку, темный фон */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%; /* Занимает всю доступную высоту родителя */
            overflow: hidden; /* Убираем полосы прокрутки */
            background: #000; /* Черный фон */
            font-family: Arial, sans-serif; /* Шрифт */
        }

        /* Стили для контейнера карты #map */
        #map {
            width: 100%; /* 100% ширины */
            height: 100vh; /* 100% высоты видимой области (viewport height) */
            /* Важно: leaflet.js требует, чтобы родительские элементы имели размеры */
        }

        /* Стили для контрола слоев Leaflet */
        .leaflet-control-layers {
            background: rgba(20, 20, 20, 0.9) !important;
            color: #fff !important;
            border: 2px solid #444 !important;
            border-radius: 5px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.4);
        }
        .leaflet-control-layers label {
            color: #fff;
        }
        .leaflet-control-layers-separator {
            background-color: #555 !important;
        }

        /* Стили для контрола поиска координат */
        .leaflet-control.coord-search-control {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%); /* Центрирование */
            z-index: 1000;
            background: rgba(20, 20, 20, 0.9);
            padding: 8px 12px;
            border-radius: 5px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .coord-search-control input {
            background: #333;
            border: 1px solid #555;
            color: #eee;
            padding: 6px 10px;
            border-radius: 3px;
            width: 180px;
            max-width: 60vw;
            font-size: 0.9em;
        }
        .coord-search-control button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 7px 12px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background 0.2s;
        }
        .coord-search-control button:hover {
            background: #45a049;
        }

        /* Стили для всплывающего окна с координатами */
        .leaflet-popup-content-wrapper {
            background: rgba(20, 20, 20, 0.9) !important;
            color: #fff !important;
            border-radius: 5px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.4);
        }
        .leaflet-popup-tip {
            background: rgba(20, 20, 20, 0.9) !important;
        }

        /* Адаптивные настройки для мобильных устройств */
        @media (max-width: 768px) {
            .leaflet-control-layers {
                top: 55px !important; /* Смещаем контрол слоев ниже */
                left: 10px !important;
            }
            .coord-search-control {
                width: calc(100% - 20px);
                left: 10px;
                transform: translateX(0);
                top: 10px;
                box-sizing: border-box;
            }
            .coord-search-control input {
                flex-grow: 1;
                width: auto;
            }
        }
    </style>
</head>
<body>
<!-- Контейнер для карты -->
<div id="map"></div>

<!-- Подключение Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/jquery@3.7.1/dist/jquery.min.js"></script>

    var map = L.map('map', { center: [48.3, 34.5], zoom: 6, zoomControl: false });

    L.control.zoom({ position: 'topright' }).addTo(map);

    var googleHybrid = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {

        attribution: 'Google Hybrid' // Атрибуция для слоя
    });

    var esriWithLabels = L.layerGroup([
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Esri World Imagery'
        }),
        // Используем метки от CartoDB поверх спутниковых снимков Esri

            attribution: 'CartoDB Labels',
            pane: 'overlayPane' // Помещаем слой меток в pane 'overlayPane', чтобы он был поверх других
        })
    ]);
    // Добавляем Google Hybrid как слой по умолчанию при загрузке карты
    googleHybrid.addTo(map);

    // Создаем группы слоев для каждого типа объектов.

    var Russia = L.layerGroup().addTo(map);
    var Ukraine = L.layerGroup().addTo(map);
    var Trench = L.layerGroup().addTo(map);
    var Teeth = L.layerGroup().addTo(map);
    var Wire = L.layerGroup().addTo(map);

    var baseMaps = {
        "Google Hybrid": googleHybrid,
        "Esri + Labels": esriWithLabels
    };
    var overlayMaps = {
